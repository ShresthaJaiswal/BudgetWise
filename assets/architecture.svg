<svg width="100%" viewBox="0 0 680 980" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #1a1a1a; }
  .th { font-size: 13px; font-weight: 600; }
  .ts { font-size: 11px; font-weight: 400; fill: #555; }
  .arr { stroke: #888; stroke-width: 1.2; fill: none; marker-end: url(#arrow); }
  .c-gray rect   { fill: #f1efe8; stroke: #888780; }
  .c-purple rect { fill: #eeedfe; stroke: #7f77dd; }
  .c-teal rect   { fill: #e1f5ee; stroke: #1d9e75; }
  .c-blue rect   { fill: #e6f1fb; stroke: #378add; }
  .c-amber rect  { fill: #faeeda; stroke: #ba7517; }
  .c-coral rect  { fill: #faece7; stroke: #d85a30; }
  .c-gray text   { fill: #444441; }
  .c-purple text { fill: #3c3489; }
  .c-teal text   { fill: #0f6e56; }
  .c-blue text   { fill: #185fa5; }
  .c-amber text  { fill: #854f0b; }
  .c-coral text  { fill: #993c1d; }
</style>
</defs>

<!-- Column headers -->
<text class="ts" x="200" y="18" text-anchor="middle" fill="#aaa">main api flow</text>
<text class="ts" x="530" y="18" text-anchor="middle" fill="#aaa">async export flow</text>
<line x1="40" y1="24" x2="360" y2="24" stroke="#ddd" stroke-width="0.5"/>
<line x1="380" y1="24" x2="640" y2="24" stroke="#ddd" stroke-width="0.5"/>

<!-- User -->
<g class="c-gray">
  <rect x="120" y="36" width="160" height="40" rx="8" stroke-width="0.5"/>
  <text class="th" x="200" y="56" text-anchor="middle" dominant-baseline="central">User / Browser</text>
</g>
<line x1="200" y1="76" x2="200" y2="96" class="arr"/>

<!-- CloudFront -->
<g class="c-purple">
  <rect x="100" y="96" width="200" height="48" rx="8" stroke-width="0.5"/>
  <text class="th" x="200" y="114" text-anchor="middle" dominant-baseline="central">CloudFront CDN</text>
  <text class="ts" x="200" y="132" text-anchor="middle" dominant-baseline="central">HTTPS · edge cache</text>
</g>
<line x1="200" y1="144" x2="200" y2="164" class="arr"/>

<!-- API Gateway -->
<g class="c-purple">
  <rect x="100" y="164" width="200" height="48" rx="8" stroke-width="0.5"/>
  <text class="th" x="200" y="182" text-anchor="middle" dominant-baseline="central">API Gateway</text>
  <text class="ts" x="200" y="198" text-anchor="middle" dominant-baseline="central">REST proxy · /dev stage</text>
</g>
<line x1="200" y1="212" x2="200" y2="232" class="arr"/>

<!-- Lambda container -->
<rect x="60" y="232" width="280" height="372" rx="12" fill="none" stroke="#ccc" stroke-width="0.5" stroke-dasharray="5 4"/>
<text class="ts" x="76" y="250" fill="#aaa">Lambda — budgetwise-lambda-dev</text>

<!-- Lambda Layers -->
<g class="c-gray">
  <rect x="76" y="258" width="248" height="32" rx="6" stroke-width="0.5"/>
  <text class="ts" x="200" y="274" text-anchor="middle" dominant-baseline="central">Lambda Layers: deps + prisma binaries</text>
</g>

<!-- Rate limiter -->
<g class="c-teal">
  <rect x="76" y="306" width="248" height="40" rx="8" stroke-width="0.5"/>
  <text class="th" x="200" y="320" text-anchor="middle" dominant-baseline="central">Rate limiter middleware</text>
  <text class="ts" x="200" y="336" text-anchor="middle" dominant-baseline="central">apiLimiter · authLimiter</text>
</g>
<line x1="200" y1="346" x2="200" y2="366" class="arr"/>

<!-- JWT auth -->
<g class="c-teal">
  <rect x="76" y="366" width="248" height="40" rx="8" stroke-width="0.5"/>
  <text class="th" x="200" y="380" text-anchor="middle" dominant-baseline="central">JWT auth middleware</text>
  <text class="ts" x="200" y="396" text-anchor="middle" dominant-baseline="central">verify access token · refresh rotation</text>
</g>
<line x1="200" y1="406" x2="200" y2="426" class="arr"/>

<!-- Express Router -->
<g class="c-blue">
  <rect x="76" y="426" width="248" height="40" rx="8" stroke-width="0.5"/>
  <text class="th" x="200" y="440" text-anchor="middle" dominant-baseline="central">Express router</text>
  <text class="ts" x="200" y="456" text-anchor="middle" dominant-baseline="central">/auth · /transactions · /groups · /stats</text>
</g>
<line x1="200" y1="466" x2="200" y2="486" class="arr"/>

<!-- Route handler -->
<g class="c-blue">
  <rect x="76" y="486" width="248" height="40" rx="8" stroke-width="0.5"/>
  <text class="th" x="200" y="500" text-anchor="middle" dominant-baseline="central">Route handler</text>
  <text class="ts" x="200" y="516" text-anchor="middle" dominant-baseline="central">validate (zod) · call service</text>
</g>
<line x1="200" y1="526" x2="200" y2="546" class="arr"/>

<!-- Prisma -->
<g class="c-blue">
  <rect x="76" y="546" width="248" height="40" rx="8" stroke-width="0.5"/>
  <text class="th" x="200" y="560" text-anchor="middle" dominant-baseline="central">Prisma ORM</text>
  <text class="ts" x="200" y="576" text-anchor="middle" dominant-baseline="central">type-safe queries · connection pool</text>
</g>
<line x1="200" y1="604" x2="200" y2="624" class="arr"/>

<!-- RDS -->
<g class="c-amber">
  <rect x="100" y="624" width="200" height="48" rx="8" stroke-width="0.5"/>
  <text class="th" x="200" y="642" text-anchor="middle" dominant-baseline="central">RDS PostgreSQL</text>
  <text class="ts" x="200" y="658" text-anchor="middle" dominant-baseline="central">budgetwise db · private subnet</text>
</g>

<!-- Branch: Route handler to export flow -->
<line x1="324" y1="506" x2="400" y2="506" class="arr"/>
<text class="ts" x="362" y="498" text-anchor="middle" fill="#999">/export/csv</text>

<!-- RIGHT COLUMN -->

<!-- sqsClient -->
<g class="c-coral">
  <rect x="400" y="486" width="220" height="40" rx="8" stroke-width="0.5"/>
  <text class="th" x="510" y="500" text-anchor="middle" dominant-baseline="central">sqsClient.enqueueJob()</text>
  <text class="ts" x="510" y="516" text-anchor="middle" dominant-baseline="central">userId · email · filters</text>
</g>
<line x1="510" y1="526" x2="510" y2="546" class="arr"/>

<!-- SQS Queue -->
<g class="c-coral">
  <rect x="400" y="546" width="220" height="40" rx="8" stroke-width="0.5"/>
  <text class="th" x="510" y="560" text-anchor="middle" dominant-baseline="central">SQS Queue</text>
  <text class="ts" x="510" y="576" text-anchor="middle" dominant-baseline="central">budgetwise-export-dev</text>
</g>
<line x1="510" y1="586" x2="510" y2="612" class="arr"/>
<text class="ts" x="536" y="601" fill="#aaa">triggers</text>

<!-- Export Lambda container -->
<rect x="388" y="612" width="244" height="210" rx="12" fill="none" stroke="#ccc" stroke-width="0.5" stroke-dasharray="5 4"/>
<text class="ts" x="404" y="628" fill="#aaa">Lambda — budgetwise-export-dev</text>

<!-- fetchTransactions -->
<g class="c-blue">
  <rect x="404" y="636" width="212" height="40" rx="8" stroke-width="0.5"/>
  <text class="th" x="510" y="650" text-anchor="middle" dominant-baseline="central">fetchTransactions()</text>
  <text class="ts" x="510" y="666" text-anchor="middle" dominant-baseline="central">Prisma query with filters</text>
</g>
<line x1="510" y1="676" x2="510" y2="696" class="arr"/>

<!-- generateCSV -->
<g class="c-blue">
  <rect x="404" y="696" width="212" height="40" rx="8" stroke-width="0.5"/>
  <text class="th" x="510" y="710" text-anchor="middle" dominant-baseline="central">generateCSV()</text>
  <text class="ts" x="510" y="726" text-anchor="middle" dominant-baseline="central">headers · rows · base64</text>
</g>
<line x1="510" y1="736" x2="510" y2="756" class="arr"/>

<!-- sendCSVEmail -->
<g class="c-blue">
  <rect x="404" y="756" width="212" height="40" rx="8" stroke-width="0.5"/>
  <text class="th" x="510" y="770" text-anchor="middle" dominant-baseline="central">sendCSVEmail()</text>
  <text class="ts" x="510" y="786" text-anchor="middle" dominant-baseline="central">MIME multipart · SES raw send</text>
</g>
<line x1="510" y1="822" x2="510" y2="848" class="arr"/>

<!-- SES -->
<g class="c-teal">
  <rect x="400" y="848" width="220" height="48" rx="8" stroke-width="0.5"/>
  <text class="th" x="510" y="866" text-anchor="middle" dominant-baseline="central">AWS SES</text>
  <text class="ts" x="510" y="882" text-anchor="middle" dominant-baseline="central">CSV attachment → user inbox</text>
</g>

<!-- DLQ branch line -->
<line x1="400" y1="566" x2="364" y2="566" stroke="#ccc" stroke-width="0.5" fill="none"/>
<line x1="364" y1="566" x2="364" y2="940" stroke="#ccc" stroke-width="0.5" fill="none"/>
<line x1="364" y1="940" x2="398" y2="940" stroke="#ccc" stroke-width="0.5" marker-end="url(#arrow)" fill="none"/>
<text class="ts" x="356" y="760" text-anchor="middle" fill="#bbb" transform="rotate(-90 356 760)">after 3 retries</text>

<!-- DLQ — pushed down to y=920 so it clears SES at y=848+48=896 -->
<g class="c-gray">
  <rect x="398" y="920" width="244" height="48" rx="8" stroke-width="0.5"/>
  <text class="th" x="520" y="938" text-anchor="middle" dominant-baseline="central">Dead Letter Queue</text>
  <text class="ts" x="520" y="954" text-anchor="middle" dominant-baseline="central">failed jobs · 14 day retention</text>
</g>

</svg>

AWSTemplateFormatVersion: '2010-09-09'
Description: BudgetWise serverless infrastructure

# Define the file format and input parameters
Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, uat, prod]
    Description: Deployment environment

  DatabaseUrl:
    Type: String
    NoEcho: true
    Description: Full PostgreSQL connection string

  FrontendURL:
    Type: String
    Description: S3 frontend URL for CORS

  JwtSecret:
    Type: String
    NoEcho: true   # won't show in logs

  JwtRefreshSecret:
    Type: String
    NoEcho: true

  AwsRegion:
    Type: String
    Default: ap-south-1
    Description: AWS Region for resources

  AWSAccountId:
    Type: String
    Default: '483510444810'
    Description: AWS Account ID

  SesFromEmail:
    Type: String
    Description: Verified SES email address for sending exports

# main section
Resources:

  # Lambda Layers
  PrismaLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: !Sub budgetwise-prisma-${Environment}   # !Sub is CloudFormation's string interpolation — it replaces ${Environment} with whatever you pass in (dev/uat/prod).
      Description: Prisma client and binaries for Lambda
      CompatibleRuntimes: [nodejs20.x]
      Content:
        S3Bucket: budgetwise-frontend-bucket
        S3Key: layer-prisma.zip

  DepsLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: !Sub budgetwise-deps-${Environment}
      Description: Other node_modules dependencies for Lambda
      CompatibleRuntimes: [nodejs20.x]
      Content:
        S3Bucket: budgetwise-frontend-bucket
        S3Key: layer-deps.zip

  # IAM Role Lambda assumes when it runs
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub budgetwise-lambda-role-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
        - arn:aws:iam::aws:policy/CloudWatchLogsFullAccess
      Policies:
        - PolicyName: BudgetWiseServices
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                  - sqs:SendMessage
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                  - s3:GetObject
                  - s3:PutObject
                Resource: '*'

  # The Lambda function itself
  BudgetWiseLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub budgetwise-lambda-${Environment}
      Runtime: nodejs20.x
      Handler: lambda.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256 # we're bumping from 128MB since Prisma needs more memory
      Layers:
        - !Ref PrismaLayer
        - !Ref DepsLayer
      Code:
        S3Bucket: budgetwise-frontend-bucket
        S3Key: lambda-code.zip
      Environment:
        Variables:
          NODE_ENV: !Ref Environment
          FRONTEND_URL: !Ref FrontendURL
          JWT_SECRET: !Ref JwtSecret
          JWT_REFRESH_SECRET: !Ref JwtRefreshSecret
          DATABASE_URL: !Ref DatabaseUrl
          AWS_REGION_NAME: !Ref AwsRegion
          SQS_QUEUE_URL: !Sub https://sqs.${AwsRegion}.amazonaws.com/${AWSAccountId}/budgetwise-${Environment}

  # API Gateway to expose the Lambda via HTTP
  BudgetWiseApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub budgetwise-api-${Environment}
      Description: BudgetWise REST API
      
  ProxyResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref BudgetWiseApi
      ParentId: !GetAtt BudgetWiseApi.RootResourceId
      PathPart: '{proxy+}'

  ProxyMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref BudgetWiseApi
      ResourceId: !Ref ProxyResource
      HttpMethod: ANY
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AwsRegion}:lambda:path/2015-03-31/functions/${BudgetWiseLambda.Arn}/invocations

  LambdaApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref BudgetWiseLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AwsRegion}:${AWSAccountId}:${BudgetWiseApi}/*/*/*

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: [ProxyMethod]
    Properties:
      RestApiId: !Ref BudgetWiseApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref BudgetWiseApi
      DeploymentId: !Ref ApiDeployment
      StageName: !Ref Environment

  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub budgetwise-${Environment}
        DefaultRootObject: index.html
        Enabled: true
        PriceClass: PriceClass_100

        Origins:
          - Id: S3-frontend
            DomainName: budgetwise-frontend-bucket.s3-website.ap-south-1.amazonaws.com
            CustomOriginConfig:
              HTTPPort: 80
              OriginProtocolPolicy: http-only

          - Id: API-Gateway
            DomainName: !Sub ${BudgetWiseApi}.execute-api.ap-south-1.amazonaws.com
            OriginPath: !Sub /${Environment}
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only

        DefaultCacheBehavior:
          TargetOriginId: S3-frontend
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized

        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: API-Gateway
            ViewerProtocolPolicy: https-only
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [GET, HEAD]
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad        # CachingDisabled
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac # AllViewerExceptHostHeader

  # SQS Queues
  ExportDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub budgetwise-export-dlq-${Environment}
      MessageRetentionPeriod: 1209600  # 14 days: messages stay in DLQ for 2 weeks for debugging

  ExportQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub budgetwise-export-${Environment}
      VisibilityTimeout: 180  # 3x Lambda timeout — gives Lambda time to finish before SQS retries
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ExportDLQ.Arn
        maxReceiveCount: 3  # after 3 failures, message moves to DLQ automatically

  #Export Lambda
  ExportLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub budgetwise-export-${Environment}
      Runtime: nodejs20.x
      Handler: exportLambda.handler
      Role: !GetAtt LambdaExecutionRole.Arn  # reuse same role, already has SES + SQS permissions
      Timeout: 60
      MemorySize: 256
      Layers:
        - !Ref PrismaLayer
        - !Ref DepsLayer
      Code:
        S3Bucket: budgetwise-frontend-bucket
        S3Key: lambda-code.zip
      Environment:
        Variables:
          NODE_ENV: !Ref Environment
          DATABASE_URL: !Ref DatabaseUrl
          AWS_REGION_NAME: !Ref AwsRegion
          SES_FROM_EMAIL: !Ref SesFromEmail
          SQS_QUEUE_URL: !GetAtt ExportQueue.QueueUrl

  # SQS → Lambda trigger
  ExportQueueTrigger:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt ExportQueue.Arn
      FunctionName: !GetAtt ExportLambda.Arn
      BatchSize: 5  # process up to 5 export jobs per Lambda invocation
      Enabled: true

# values CloudFormation prints after a successful deploy
Outputs:
  ApiUrl:
    Description: API Gateway URL
    Value: !Sub https://${BudgetWiseApi}.execute-api.${AwsRegion}.amazonaws.com/${Environment}
    # Makes Outputs available to other CloudFormation stacks if we ever split infrastructure into multiple templates.
    Export:
      Name: !Sub budgetwise-api-url-${Environment}

  LambdaFunctionName:
    Description: Lambda function name
    Value: !Ref BudgetWiseLambda
    Export:
      Name: !Sub budgetwise-lambda-${Environment}

  LambdaFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt BudgetWiseLambda.Arn
    Export:
      Name: !Sub budgetwise-lambda-arn-${Environment}

  CloudFrontURL:
    Description: CloudFront distribution URL
    Value: !Sub https://${CloudFrontDistribution.DomainName}
    Export:
      Name: !Sub budgetwise-cloudfront-url-${Environment}

  ExportQueueUrl:
    Description: SQS Export Queue URL
    Value: !GetAtt ExportQueue.QueueUrl
    Export:
      Name: !Sub budgetwise-export-queue-${Environment}

  ExportDLQUrl:
    Description: SQS Export DLQ URL
    Value: !GetAtt ExportDLQ.QueueUrl
    Export:
      Name: !Sub budgetwise-export-dlq-${Environment}
